version: "3.8"

services:
  backend:
    image: backend-test:latest
    ports:
      - "8000:8000"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    networks:
      - backend-net

networks:
  backend-net:
    driver: overlay
